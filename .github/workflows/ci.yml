name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swarm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Server tests (JSON DB)
        working-directory: ./server
        run: npm test
        env:
          TEST_MODE: "1"

      - name: Server tests (PostgreSQL)
        working-directory: ./server
        run: npm test
        env:
          TEST_MODE: "1"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/swarm_test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
