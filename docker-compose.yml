services:
  postgres-db:
    image: postgres:15-alpine
    container_name: swarm-postgres
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
      POSTGRES_DB: ${PG_DATABASE:-swarm_allocator}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: swarm-api
    restart: always
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASSWORD:-changeme}@postgres-db:${PG_PORT:-5432}/${PG_DATABASE:-swarm_allocator}
      CONTROL_PLANE_TOKEN: ${CONTROL_PLANE_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
      APP_URL: ${APP_URL:-http://localhost:80}
    ports:
      - "${API_PORT:-3001}:3001"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swarm-app
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  pgdata:
