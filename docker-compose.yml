services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: swarm-api
    restart: always
    environment:
      NODE_ENV: production
      CONTROL_PLANE_TOKEN: ${CONTROL_PLANE_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
      APP_URL: ${APP_URL:-http://localhost:80}
    volumes:
      - sqlite_data:/app/server/db_data
    ports:
      - "${API_PORT:-3001}:3001"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swarm-app
    restart: always
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  sqlite_data:
