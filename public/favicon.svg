<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%" fill="none">
  <defs>
    <!-- Node Gradients -->
    <linearGradient id="grad-budget" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="grad-eng-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="grad-mkt-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="grad-sales-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="grad-ops-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Link Gradients -->
    <linearGradient id="grad-eng-link" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.75" />
    </linearGradient>
    <linearGradient id="grad-mkt-link" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.65" />
    </linearGradient>
    <linearGradient id="grad-sales-link" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.60" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.60" />
    </linearGradient>
    <linearGradient id="grad-ops-link" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.55" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Flow Paths -->
  <path d="M 20 42 C 60 42, 60 24, 100 24" stroke="url(#grad-eng-link)" stroke-width="10" fill="none" />
  <path d="M 20 54 C 60 54, 60 49, 100 49" stroke="url(#grad-mkt-link)" stroke-width="8" fill="none" />
  <path d="M 20 66 C 60 66, 60 74, 100 74" stroke="url(#grad-sales-link)" stroke-width="8" fill="none" />
  <path d="M 20 78 C 60 78, 60 99, 100 99" stroke="url(#grad-ops-link)" stroke-width="6" fill="none" />

  <!-- Source Node (Total Budget) -->
  <rect x="12" y="30" width="8" height="60" rx="4" fill="url(#grad-budget)" filter="url(#glow)" />

  <!-- Target Nodes (Departments) -->
  <rect x="100" y="15" width="8" height="18" rx="4" fill="url(#grad-eng-node)" />
  <rect x="100" y="40" width="8" height="18" rx="4" fill="url(#grad-mkt-node)" />
  <rect x="100" y="65" width="8" height="18" rx="4" fill="url(#grad-sales-node)" />
  <rect x="100" y="90" width="8" height="18" rx="4" fill="url(#grad-ops-node)" />
</svg>